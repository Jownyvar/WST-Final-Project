var text, parser, xmlDoc;

// Note: I added a root tag <root> to show how you'd handle multiple entries
text = "<root>" +
         "<candidates>" +
           "<position>President</position>" +
           "<lastName>Doe</lastName>" +
           "<firstName>Jane</firstName>" +
           "<middleName>A.</middleName>" +
         "</candidates>" +
       "</root>";

parser = new DOMParser();
xmlDoc = parser.parseFromString(text, "text/xml");

// 1. Target the correct tag name: "candidates"
var candidates = xmlDoc.getElementsByTagName("candidates");

for (var i = 0; i < candidates.length; i++) {
  // 2. Helper function or direct access to get text safely
  var position = candidates[i].getElementsByTagName("position")[0].textContent;
  var lastName = candidates[i].getElementsByTagName("lastName")[0].textContent;
  var firstName = candidates[i].getElementsByTagName("firstName")[0].textContent;
  var middleName = candidates[i].getElementsByTagName("middleName")[0].textContent;

  console.log(position, lastName, firstName, middleName);
}
